---
- name: Update Debian and Docker
  hosts: all
  become: true

  tasks:
    - name: Get Debian version before Update
      command: cat /etc/debian_version
      register: debian_version_before
      changed_when: false

    - name: Get Docker version before Update
      command: docker --version
      register: docker_version_before
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all system packages
      apt:
        upgrade: dist

    - name: Update Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest

    - name: Restart Docker
      service:
        name: docker
        state: restarted

    - name: Get Debian version after Update
      command: cat /etc/debian_version
      register: debian_version_after
      changed_when: false

    - name: Get Docker version after Update
      command: docker --version
      register: docker_version_after
      changed_when: false

    - name: Show versions
      debug:
        msg:
          - "Before:"
          - "Debian: {{ debian_version_before.stdout }}"
          - "Docker: {{ docker_version_before.stdout }}"
          - "After:"
          - "Debian: {{ debian_version_after.stdout }}"
          - "Docker: {{ docker_version_after.stdout }}"
